# TDD Experiment Docker Compose Configuration
# Run experiments in isolated containers

services:
  experiment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment

    # Mount experiment files
    volumes:
      # Experiment definitions (read-only)
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro

      # Run output (read-write)
      - ../runs:/home/experimenter/experiments/runs:rw

      # Scripts
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro

      # Claude config (active settings.json provides auth + base URL + custom headers)
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/experimenter/.claude:rw

    # Environment
    # Auth + backend selection comes from the mounted ~/.claude/settings.json
    # (switched on the host via claude-native / claude-portkey / claude-elflein).
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production

    # Resource limits for safety
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # Interactive mode for experiment runner
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /home/experimenter/experiments

  # Batch runner for automated experiments
  batch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment-batch

    volumes:
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro
      - ../runs:/home/experimenter/experiments/runs:rw
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro
      - ./run-batch.sh:/home/experimenter/experiments/run-batch.sh:ro
      # Batch plan files (e.g. smoke-test.json, hybrid-matrix.json)
      - ../batch-plans:/home/experimenter/experiments/batch-plans:ro
      # Claude config (active settings.json provides auth + base URL + custom headers)
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/experimenter/.claude:rw

    # Auth + backend selection comes from the mounted ~/.claude/settings.json
    # (switched on the host via claude-native / claude-portkey / claude-elflein).
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production
      # Optional: name (or path) of a batch plan file. If set, only the
      # listed runs are executed; otherwise the full cross-product is run.
      - BATCH_PLAN=${BATCH_PLAN:-}
      # Per-run hard timeout (seconds). Forwarded to run-batch.sh.
      - CLAUDE_TIMEOUT_SECONDS=${CLAUDE_TIMEOUT_SECONDS:-1800}

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

    working_dir: /home/experimenter/experiments

    # Batch runs non-interactively. If $BATCH_PLAN is set we forward it
    # to run-batch.sh as --plan.
    command:
      - bash
      - -c
      - |
        if [ -n "$$BATCH_PLAN" ]; then
          exec bash run-batch.sh --plan "$$BATCH_PLAN"
        else
          exec bash run-batch.sh
        fi

    profiles:
      - batch

  # Retry runner for failed experiments (API budget exceeded)
  batch-retry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment-batch-retry

    volumes:
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro
      - ../runs:/home/experimenter/experiments/runs:rw
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro
      - ./run-batch-retry.sh:/home/experimenter/experiments/run-batch-retry.sh:ro
      # Claude config (active settings.json provides auth + base URL + custom headers)
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/experimenter/.claude:rw

    # Auth + backend selection comes from the mounted ~/.claude/settings.json
    # (switched on the host via claude-native / claude-portkey / claude-elflein).
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

    working_dir: /home/experimenter/experiments

    command: ["bash", "run-batch-retry.sh"]

    profiles:
      - batch-retry

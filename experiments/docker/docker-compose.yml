# TDD Experiment Docker Compose Configuration
# Run experiments in isolated containers

services:
  experiment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment

    # Mount experiment files
    volumes:
      # Experiment definitions (read-only)
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro

      # Run output (read-write)
      - ../runs:/home/experimenter/experiments/runs:rw

      # Scripts
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro
      - ../parse_opencode_transcript.py:/home/experimenter/experiments/parse_opencode_transcript.py:ro
      - ../parse_pi_transcript.py:/home/experimenter/experiments/parse_pi_transcript.py:ro

      # Claude config — schlankes Container-Profil (./claude-config), kein
      # MCP, keine Host-Pfade. Override via CLAUDE_CONFIG_DIR=~/.claude.
      - ${CLAUDE_CONFIG_DIR:-./claude-config}:/home/experimenter/.claude:rw
      # OAuth-Token aus dem Host bind-mounten (separat, weil Symlinks im
      # Bind-Mount-Verzeichnis im Container ins Leere zeigen würden).
      - ${CLAUDE_CREDENTIALS_FILE:-~/.claude/.credentials.json}:/home/experimenter/.claude/.credentials.json:rw
      # pi config — slim container profile (./pi-config). Carries models.json
      # (Portkey provider) and the subagent extension. Workflows add their
      # own .pi/skills/ and .pi/agents/ via cwd walk-up.
      - ${PI_CONFIG_DIR:-./pi-config}:/home/experimenter/.pi:rw

      # Persistent pnpm store shared across runs (avoids re-downloading deps)
      - pnpm-store:/home/experimenter/.local/share/pnpm/store:rw

    # Environment
    # .env (docker-Verzeichnis) liefert u.a. ANTHROPIC_BASE_URL,
    # ANTHROPIC_AUTH_TOKEN, ANTHROPIC_CUSTOM_HEADERS und die
    # ANTHROPIC_DEFAULT_*_MODEL-Routen für Portkey-Routing.
    env_file:
      - .env
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production
      # Explicit pass-through (env_file lädt sie schon, hier nur dokumentiert)
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_CUSTOM_HEADERS=${ANTHROPIC_CUSTOM_HEADERS:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=${CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS:-}

    # Resource limits for safety
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # Interactive mode for experiment runner
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /home/experimenter/experiments

  # Batch runner for automated experiments
  batch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment-batch

    volumes:
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro
      - ../runs:/home/experimenter/experiments/runs:rw
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro
      - ../parse_opencode_transcript.py:/home/experimenter/experiments/parse_opencode_transcript.py:ro
      - ../parse_pi_transcript.py:/home/experimenter/experiments/parse_pi_transcript.py:ro
      - ./run-batch.sh:/home/experimenter/experiments/run-batch.sh:ro
      # Batch plan files (e.g. smoke-test.json, hybrid-matrix.json)
      - ../batch-plans:/home/experimenter/experiments/batch-plans:ro
      # Claude config — schlankes Container-Profil (./claude-config), kein
      # MCP, keine Host-Pfade. Override via CLAUDE_CONFIG_DIR=~/.claude.
      - ${CLAUDE_CONFIG_DIR:-./claude-config}:/home/experimenter/.claude:rw
      # OAuth-Token aus dem Host bind-mounten (separat, weil Symlinks im
      # Bind-Mount-Verzeichnis im Container ins Leere zeigen würden).
      - ${CLAUDE_CREDENTIALS_FILE:-~/.claude/.credentials.json}:/home/experimenter/.claude/.credentials.json:rw
      # pi config — slim container profile (./pi-config). Carries models.json
      # (Portkey provider) and the subagent extension. Workflows add their
      # own .pi/skills/ and .pi/agents/ via cwd walk-up.
      - ${PI_CONFIG_DIR:-./pi-config}:/home/experimenter/.pi:rw

      # Persistent pnpm store shared across runs (avoids re-downloading deps)
      - pnpm-store:/home/experimenter/.local/share/pnpm/store:rw

    env_file:
      - .env
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production
      # Optional: name (or path) of a batch plan file. If set, only the
      # listed runs are executed; otherwise the full cross-product is run.
      - BATCH_PLAN=${BATCH_PLAN:-}
      # Per-run hard timeout (seconds). Forwarded to run-batch.sh.
      # Default 7200s (2h) — raised 2026-05-21 because v4.1/v4.2/v6 workflows
      # routinely exceed 90 min on slower models (esp. Opus 4.6 portkey).
      # Methodological budget, see top-level README.md → "Timeouts as a research finding".
      - CLAUDE_TIMEOUT_SECONDS=${CLAUDE_TIMEOUT_SECONDS:-7200}
      # Portkey routing pass-through (env_file lädt sie schon)
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_CUSTOM_HEADERS=${ANTHROPIC_CUSTOM_HEADERS:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=${CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS:-}
      # PORTKEY_API_KEY is loaded exclusively via env_file (.env) — we
      # deliberately do NOT add an explicit `${PORTKEY_API_KEY:-}` line
      # because that interpolates the shell value first, which on this
      # machine carries a stale eval key. env_file ensures .env wins.

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

    working_dir: /home/experimenter/experiments

    # Batch runs non-interactively. If $BATCH_PLAN is set we forward it
    # to run-batch.sh as --plan.
    command:
      - bash
      - -c
      - |
        if [ -n "$$BATCH_PLAN" ]; then
          exec bash run-batch.sh --plan "$$BATCH_PLAN"
        else
          exec bash run-batch.sh
        fi

    profiles:
      - batch

  # Retry runner for failed experiments (API budget exceeded)
  batch-retry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdd-experiment-batch-retry

    volumes:
      - ../katas:/home/experimenter/experiments/katas:ro
      - ../workflows:/home/experimenter/experiments/workflows:ro
      - ../runs:/home/experimenter/experiments/runs:rw
      - ../record-run.sh:/home/experimenter/experiments/record-run.sh:ro
      - ../analyze-run.sh:/home/experimenter/experiments/analyze-run.sh:ro
      - ../analyze_transcript.py:/home/experimenter/experiments/analyze_transcript.py:ro
      - ../parse_opencode_transcript.py:/home/experimenter/experiments/parse_opencode_transcript.py:ro
      - ../parse_pi_transcript.py:/home/experimenter/experiments/parse_pi_transcript.py:ro
      - ./run-batch-retry.sh:/home/experimenter/experiments/run-batch-retry.sh:ro
      # Claude config — schlankes Container-Profil (./claude-config), kein
      # MCP, keine Host-Pfade. Override via CLAUDE_CONFIG_DIR=~/.claude.
      - ${CLAUDE_CONFIG_DIR:-./claude-config}:/home/experimenter/.claude:rw
      # OAuth-Token aus dem Host bind-mounten (separat, weil Symlinks im
      # Bind-Mount-Verzeichnis im Container ins Leere zeigen würden).
      - ${CLAUDE_CREDENTIALS_FILE:-~/.claude/.credentials.json}:/home/experimenter/.claude/.credentials.json:rw
      # pi config — slim container profile (./pi-config). Carries models.json
      # (Portkey provider) and the subagent extension. Workflows add their
      # own .pi/skills/ and .pi/agents/ via cwd walk-up.
      - ${PI_CONFIG_DIR:-./pi-config}:/home/experimenter/.pi:rw

      # Persistent pnpm store shared across runs (avoids re-downloading deps)
      - pnpm-store:/home/experimenter/.local/share/pnpm/store:rw

    env_file:
      - .env
    environment:
      - CLAUDE_THINKING=${CLAUDE_THINKING:-true}
      - NODE_ENV=production
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_CUSTOM_HEADERS=${ANTHROPIC_CUSTOM_HEADERS:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=${CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS:-}

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

    working_dir: /home/experimenter/experiments

    command: ["bash", "run-batch-retry.sh"]

    profiles:
      - batch-retry

volumes:
  # Shared pnpm content-addressable store. Persists across container
  # restarts so subsequent runs reuse already-downloaded packages.
  pnpm-store:
